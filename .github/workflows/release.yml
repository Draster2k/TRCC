name: Build wheels and publish to PyPI

# Tag-driven release workflow.
# Push a v*.*.* tag to build wheels for Linux / macOS / Windows on all
# supported Python minor versions, then publish to PyPI via Trusted
# Publishing (no API token stored anywhere).
#
# Manual trigger (workflow_dispatch) builds wheels but skips the publish
# step — useful for sanity-checking before tagging.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

jobs:
  # ─────────────────────────────────────── build native wheels per platform
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          # Build CPython 3.9 → 3.12; skip PyPy and musllinux for now
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-*
          CIBW_SKIP: "*-musllinux_* *-win32 *_i686"

          # Linux: x86_64 only (most common). Add aarch64 later if needed.
          CIBW_ARCHS_LINUX: x86_64
          # macOS: build BOTH arm64 (M-series) and x86_64 (Intel)
          CIBW_ARCHS_MACOS: arm64 x86_64
          CIBW_ARCHS_WINDOWS: AMD64

          # The package builds via pyproject.toml + setup.py; pybind11 is
          # auto-installed by the build-system.requires field. nanoflann
          # is header-only and vendored, so no system deps needed.

          # Smoke test each wheel — verify import + native ext loaded.
          CIBW_TEST_COMMAND: >
            python -c "import trcc, sys; print('trcc', trcc.__version__,
            'has_extension', trcc.has_extension); sys.exit(0 if trcc.has_extension else 1)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  # ─────────────────────────────────────── build sdist on a single linux
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --upgrade build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  # ─────────────────────────────────────── publish (tag pushes only)
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write   # required for PyPI Trusted Publishing
    environment:
      name: pypi
      url: https://pypi.org/p/trcc

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted Publishing — no API token. PyPI verifies the OIDC
          # claim chain GitHub → repo → workflow → environment.
          packages-dir: dist/
          skip-existing: true
